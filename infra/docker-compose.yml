# FakeFace FinGuard — инфраструктура MVP.
# Запуск: docker compose -f infra/docker-compose.yml up -d   (см. README)
#
# ВНИМАНИЕ по портам на этой машине:
#   - host:8000 уже занят сторонним embeddings-service (uvicorn). Поэтому vLLM
#     отдаём наружу на ${VLLM_HOST_PORT:-8100}. Внутри docker-сети он всё равно
#     слушает 8000, и backend ходит на http://vllm:8000/v1 — менять клиент не нужно.
#   - GPU на машине может быть занят другой задачей. Поднимать vllm только когда
#     GPU свободен (иначе out-of-memory).

services:
  vllm:
    image: vllm/vllm-openai:latest
    profiles: ["gpu"]          # требует GPU+toolkit: docker compose --profile gpu up -d
    # util=0.5 → vLLM ~12 ГБ из 24, оставляя место deepfake-детектору (CUDA, ~3–5 ГБ)
    # при полном пайплайне. Свободный GPU → можно поднять: VLLM_GPU_UTIL=0.9.
    command: >
      --model ${LLM_MODEL:-Qwen/Qwen2.5-7B-Instruct-AWQ}
      --max-model-len ${VLLM_MAX_MODEL_LEN:-4096}
      --gpu-memory-utilization ${VLLM_GPU_UTIL:-0.5}
    ports:
      - "${VLLM_HOST_PORT:-8100}:8000"
    volumes:
      # HF_CACHE=путь → переиспользовать уже скачанные модели (иначе именованный том)
      - ${HF_CACHE:-hf_cache}:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-finguard_pass}
    volumes:
      - neo4j_data:/data

  postgres:
    image: postgres:16
    ports:
      # host:5432 часто занят другим проектом → наружу отдаём 5433 (внутри сети — 5432)
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finguard_pass}
      POSTGRES_DB: ${POSTGRES_DB:-finguard}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finguard}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:                     # веб-UI для Postgres → http://localhost:8081
    image: adminer:latest
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on: [postgres]
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    env_file: ../.env
    ports:
      - "${API_HOST_PORT:-8088}:8080"   # хост:8088 → контейнер:8080 (8080 на хосте бывает занят)
    environment:
      # внутри docker-сети — по именам сервисов; LLM off по умолчанию (vllm — профиль gpu)
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-finguard}:${POSTGRES_PASSWORD:-finguard_pass}@postgres:5432/${POSTGRES_DB:-finguard}
      ENABLE_LLM: "${ENABLE_LLM:-false}"
      LLM_BASE_URL: http://vllm:8000/v1
      ENABLE_DEEPFAKE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
    volumes:
      - ../data:/app/data

  frontend:
    build:
      # фронт-репо av1cu/ai_media_watch_frontend рядом с проектом (можно переопределить FRONTEND_CONTEXT)
      context: ${FRONTEND_CONTEXT:-../../ai_media_watch_frontend}
      args:
        # адрес backend, который видит БРАУЗЕР (fetch с клиента) — не docker-сеть
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8088}
    ports:
      - "3000:3000"
    depends_on: [api]
    restart: unless-stopped

volumes:
  hf_cache:
  qdrant_data:
  neo4j_data:
  pg_data:
