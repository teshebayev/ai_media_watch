# FakeFace FinGuard — инфраструктура MVP.
# Запуск: docker compose -f infra/docker-compose.yml up -d   (см. README)
#
# ВНИМАНИЕ по портам на этой машине:
#   - host:8000 уже занят сторонним embeddings-service (uvicorn). Поэтому vLLM
#     отдаём наружу на ${VLLM_HOST_PORT:-8100}. Внутри docker-сети он всё равно
#     слушает 8000, и backend ходит на http://vllm:8000/v1 — менять клиент не нужно.
#   - GPU на машине может быть занят другой задачей. Поднимать vllm только когда
#     GPU свободен (иначе out-of-memory).

services:
  vllm:
    image: vllm/vllm-openai:latest
    command: >
      --model ${LLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      --max-model-len ${VLLM_MAX_MODEL_LEN:-8192}
      --gpu-memory-utilization ${VLLM_GPU_UTIL:-0.90}
    ports:
      - "${VLLM_HOST_PORT:-8100}:8000"
    volumes:
      # HF_CACHE=путь → переиспользовать уже скачанные модели (иначе именованный том)
      - ${HF_CACHE:-hf_cache}:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-finguard_pass}
    volumes:
      - neo4j_data:/data

  postgres:
    image: postgres:16
    ports:
      # host:5432 часто занят другим проектом → наружу отдаём 5433 (внутри сети — 5432)
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finguard_pass}
      POSTGRES_DB: ${POSTGRES_DB:-finguard}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finguard}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    env_file: ../.env
    depends_on: [vllm, qdrant, neo4j, postgres]
    volumes:
      - ../data:/app/data

volumes:
  hf_cache:
  qdrant_data:
  neo4j_data:
  pg_data:
